<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Budget App</title>
    
</head>
<body>
    <div class="container">
        <div class="input-form">
            <h1>Budget<span>Pro</span></h1>

            <div class="currency-toggle">
                <button id="brasil" class="currency-button active">R$</button>
                <button id="usa" class="currency-button">USD$</button>

            </div>

            <input type="text" id="description" placeholder="Description (ex: Rent, Salary)">
            <input type="number" id="amount" placeholder="Amount (ex: 100)">

            <div class="input-form__toggle">
                <button id="income-button" class="toggle-button active">Income</button>
                <button id="expense-button" class="toggle-button">Expense</button>
            </div>
            <button id="add-button">Add Transaction</button>

        </div>

        <div class="transactions">
            <div class="transaction-header">
                <h2>Transactions</h2>
                <select id="sort-select">
                    <option value="newest">Newest</option>
                    <option value="oldest">Oldest</option>
                    <option value="highest">Highest</option>
                    <option value="lowest">Lowest</option>
                
                
                </select>

            </div>
            <ul id="transactions-list">
                <li>No transactions yet</li>
            </ul>
        </div>

        <div class="chart-section">
            <h2>Income vs Expenses</h2>
            <canvas id="budget-chart"></canvas>
        </div>


        <div class="summary">
            <div class="summary__balance">
                <p>Balance</p>
                <h2 id="balance">R$0.00</h2>
            </div>
            <div class="summary__income">
                <p>Income</p>
                <h2 id="total-income">R$0.00</h2>
            </div>
            <div class="summary__expense">
                <p>Expenses</p>
                <h2 id="total-expense">R$0.00</h2>
            </div>
        </div>






    </div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>  
</body>
</html>
