<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Budget App</title>
    
</head>
<body>
    <div class="container">
        <div class="input-form">
            <h1>BudgetPro</h1>
            <input type="text" id="description" placeholder="Description (ex: Rent, Salary)">
            <input type="number" id="amount" placeholder="Amount (ex: 100)">

            <div class="input-form__toggle">
                <button id="income-button" class="toggle-button active">Income</button>
                <button id="expense-button" class="toggle-button">Expense</button>
            </div>

        </div>

        <div class="transactions">
            <h2>Transactions</h2>
            <ul id="transactions-list"></ul>
        </div>

        <div class="chart-section">
            <h2>Income vs Expenses</h2>
            <canvas id="budget-chart"></canvas>
        </div>


        <div class="summary">
            <div class="summary__balance">
                <p>Balance</p>
                <h2 id="balance">$0.00</h2>
            </div>
            <div class="summary__income">
                <p>Income</p>
                <h2 id="total-income">$0.00</h2>
            </div>
            <div class="summary__expense">
                <p>Expenses</p>
                <h2 id="total-expense">$0.00</h2>
            </div>
        </div>






    </div>
<script src="script.js"></script>  
</body>
</html>
